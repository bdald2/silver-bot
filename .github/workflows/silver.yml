name: Silver & Gold Price Bot

on:
  schedule:
    - cron: '3 2 * * 1-5'
    - cron: '0,30 * * * 1-5'
  workflow_dispatch:

jobs:
  daily-price:
    runs-on: ubuntu-latest
    if: github.event.schedule == '3 2 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 매일 정기 전송 - 은 시세
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: daily
        run: python silver_bot.py

      - name: 매일 정기 전송 - 금 시세
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: gold_daily
        run: python silver_bot.py

  check-price:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0,30 * * * 1-5'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Restore cache (silver & gold hash)
        uses: actions/cache/restore@v4
        with:
          path: |
            last_silver_post.txt
            last_gold_post.txt
          key: price-hash-${{ github.run_id }}
          restore-keys: |
            price-hash-

      - name: 은 시세 변동 체크 (매 30분)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: check
        run: python silver_bot.py

      - name: 금 시세 변동 체크 (매 30분)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: gold_check
        run: python silver_bot.py

      - name: Save cache (silver & gold hash)
        uses: actions/cache/save@v4
        with:
          path: |
            last_silver_post.txt
            last_gold_post.txt
          key: price-hash-${{ github.run_id }}
