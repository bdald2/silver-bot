name: Silver & Gold Price Bot

on:
  schedule:
    - cron: '3 2 * * *'       # 매일 오전 11시 3분 KST (UTC 02:03)
    - cron: '0,30 * * * *'    # 매 30분마다 새 글 체크 (기존 60분→30분)
  workflow_dispatch:          # 수동 실행

jobs:

  daily-price:
    runs-on: ubuntu-latest
    if: github.event.schedule == '3 2 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 매일 정기 전송 - 은 시세
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: daily
        run: python silver_bot.py

      - name: 매일 정기 전송 - 금 시세
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: gold_daily
        run: python silver_bot.py

  check-price:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0,30 * * * *'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Restore cache (last_post.txt)
        uses: actions/cache@v3
        with:
          path: last_post.txt
          key: silver-last-post-v1

      - name: 시세 변동 체크 (매 30분)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: check
        run: python silver_bot.py

      - name: Save cache (last_post.txt)
        uses: actions/cache@v3
        with:
          path: last_post.txt
          key: silver-last-post-v1
