name: Silver & Gold Price Bot

on:
  schedule:
    - cron: '3 2 * * *'   # 매일 오전 11시 3분 (한국시간)
    - cron: '0 * * * *'   # 매 1시간마다 새 글 체크
  workflow_dispatch:       # 수동 실행 가능

jobs:
  send-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 캐시 불러오기 (은 시세 해시 유지)
        uses: actions/cache/restore@v3
        with:
          path: last_silver_post.txt
          key: last-silver-post-cache
          restore-keys: |
            last-silver-post-cache

      - name: 캐시 불러오기 (금 시세 해시 유지)
        uses: actions/cache/restore@v3
        with:
          path: last_gold_post.txt
          key: last-gold-post-cache
          restore-keys: |
            last-gold-post-cache

      - name: last_silver_post.txt 없으면 빈 파일 생성
        run: touch last_silver_post.txt

      - name: last_gold_post.txt 없으면 빈 파일 생성
        run: touch last_gold_post.txt

      - name: 매일 정기 전송 - 은 시세 (11시 3분)
        if: github.event.schedule == '3 2 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: daily
        run: python silver_bot.py

      - name: 매일 정기 전송 - 금 시세 (11시 3분)
        if: github.event.schedule == '3 2 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: gold_daily
        run: python silver_bot.py

      - name: 새 글 체크 - 은 시세 (매시간)
        if: github.event.schedule == '0 * * * *'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: check
        run: python silver_bot.py

      - name: 새 글 체크 - 금 시세 (매시간)
        if: github.event.schedule == '0 * * * *'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: gold_check
        run: python silver_bot.py

      - name: 캐시 저장 - 은 시세 해시
        if: always()
        uses: actions/cache/save@v3
        with:
          path: last_silver_post.txt
          key: last-silver-post-cache-${{ github.run_id }}

      - name: 캐시 저장 - 금 시세 해시
        if: always()
        uses: actions/cache/save@v3
        with:
          path: last_gold_post.txt
          key: last-gold-post-cache-${{ github.run_id }}
