name: Silver Price Bot
on:
  schedule:
    - cron: '3 2 * * *'    # 매일 오전 11시 3분 (한국시간)
    - cron: '0 * * * *'    # 매 1시간마다 새 글 체크
  workflow_dispatch:        # 수동 실행 가능

jobs:
  send-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 캐시 불러오기 (last_post.txt 유지)
        uses: actions/cache/restore@v3
        with:
          path: last_post.txt
          key: last-post-cache
          restore-keys: |
            last-post-cache

      - name: last_post.txt 없으면 빈 파일 생성
        run: touch last_post.txt

      - name: 매일 정기 전송 (11시 3분)
        if: github.event.schedule == '3 2 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: daily
        run: python silver_bot.py

      - name: 새 글 체크 (매시간)
        if: github.event.schedule == '0 * * * *'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: check
        run: python silver_bot.py

      - name: 캐시 저장 (last_post.txt 보존)
        if: always()
        uses: actions/cache/save@v3
        with:
          path: last_post.txt
          key: last-post-cache-${{ github.run_id }}
