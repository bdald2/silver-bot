name: Silver & Gold Price Bot

on:
  schedule:
    - cron: '3 2 * * 1-5'
    - cron: '0,30 * * * 1-5'
  workflow_dispatch:

jobs:
  daily-price:
    runs-on: ubuntu-latest
    if: github.event.schedule == '3 2 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Daily send - silver/gold combined
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: combined_daily
        run: python silver_bot.py

  check-price:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0,30 * * * 1-5'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Restore cache (silver & gold state)
        uses: actions/cache/restore@v4
        with:
          path: |
            last_silver_state.txt
            last_gold_state.txt
          key: price-state-${{ github.run_id }}
          restore-keys: |
            price-state-

      - name: Check price change - combined
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MODE: combined_check
        run: python silver_bot.py

      - name: Save cache (silver & gold state)
        uses: actions/cache/save@v4
        with:
          path: |
            last_silver_state.txt
            last_gold_state.txt
          key: price-state-${{ github.run_id }}
